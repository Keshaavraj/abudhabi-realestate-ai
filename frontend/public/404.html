<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Abu Dhabi Real Estate AI</title>
  <script>
    // GitHub Pages SPA routing fix.
    // When GitHub serves this 404 page, encode the path into a query string
    // and redirect to index.html, where a matching script decodes it back.
    var segmentCount = 1; // number of path segments in basepath (/abudhabi-realestate-ai/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
